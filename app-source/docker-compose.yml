version: "3.8"

# =============================================================================
# SPO Backup System v4.0 — Synology Deployment
# Storage: /volume3/spo-backup (28TB available)
# =============================================================================

services:
  spo-backup:
    build: .
    image: spo-backup:v4
    container_name: spo-backup-web
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - /volume3/spo-backup/data:/backup/sharepoint
      - /volume3/spo-backup/config/config.json:/app/config.json
      - /volume3/spo-backup/logs:/app/logs
    environment:
      - SECRET_KEY=${SECRET_KEY:-digiserve-spo-backup-2026}
      - TZ=Asia/Jakarta
      - CONFIG_PATH=/app/config.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks: [backup-net]

  redis:
    image: redis:7-alpine
    container_name: spo-backup-redis
    restart: unless-stopped
    volumes:
      - /volume3/spo-backup/redis:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [backup-net]

  celery-worker:
    image: spo-backup:v4
    container_name: spo-backup-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    volumes:
      - /volume3/spo-backup/data:/backup/sharepoint
      - /volume3/spo-backup/config/config.json:/app/config.json
      - /volume3/spo-backup/logs:/app/logs
    environment:
      - TZ=Asia/Jakarta
      - CONFIG_PATH=/app/config.json
    depends_on: [redis, spo-backup]
    networks: [backup-net]

  celery-beat:
    image: spo-backup:v4
    container_name: spo-backup-scheduler
    restart: unless-stopped
    command: celery -A app.tasks beat --loglevel=info --schedule=/app/celerybeat-schedule
    volumes:
      - /volume3/spo-backup/data:/backup/sharepoint
      - /volume3/spo-backup/config/config.json:/app/config.json
      - /volume3/spo-backup/logs:/app/logs
    environment:
      - TZ=Asia/Jakarta
      - CONFIG_PATH=/app/config.json
    depends_on: [redis, spo-backup]
    networks: [backup-net]

networks:
  backup-net:
    driver: bridge
    name: spo-backup-net
